name: macOS Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Python Dependencies
      run: pip3 install Pillow
      
    - name: Compile and Bundle Native macOS App
      run: |
        chmod +x build.sh
        ./build.sh
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LightConda-App
        path: LightConda.zip
